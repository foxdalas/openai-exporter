name: build-and-test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Go mod download
        run: go mod download

      - name: gofmt
        uses: Jerome1337/gofmt-action@v1.0.5
        with:
          gofmt-path: '.'
          gofmt-flags: '-l -d'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build ./...
