version: 2
project_name: openai-exporter

release:
  github:
    owner: prezi
    name: openai-exporter

builds:
  - id: openai-exporter
    binary: openai-exporter
    main: .
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

dockers:
  - id: openai-exporter-amd64
    goos: linux
    goarch: amd64
    ids: [openai-exporter]
    image_templates:
      - "ghcr.io/prezi/openai-exporter:{{ .Version }}-amd64"
      - "ghcr.io/prezi/openai-exporter:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/prezi/openai-exporter"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    use: buildx

  - id: openai-exporter-arm64
    goos: linux
    goarch: arm64
    ids: [openai-exporter]
    image_templates:
      - "ghcr.io/prezi/openai-exporter:{{ .Version }}-arm64"
      - "ghcr.io/prezi/openai-exporter:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/prezi/openai-exporter"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
    use: buildx

docker_manifests:
  - name_template: ghcr.io/prezi/openai-exporter:{{ .Version }}
    image_templates:
      - ghcr.io/prezi/openai-exporter:{{ .Version }}-amd64
      - ghcr.io/prezi/openai-exporter:{{ .Version }}-arm64
  - name_template: ghcr.io/prezi/openai-exporter:latest
    image_templates:
      - ghcr.io/prezi/openai-exporter:latest-amd64
      - ghcr.io/prezi/openai-exporter:latest-arm64

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^build\(deps\):'
